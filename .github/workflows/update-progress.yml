name: Update Progress

on:
  push:
    branches:
      - main
      - master

jobs:
  update-progress:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: [ 1.0.3 ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install protobuf capstone colorama cxxfilt pyelftools ansiwrap watchdog python-Levenshtein toml gitpython

      - name: Generate report
        run: |
          PYTHONPATH="${PYTHONPATH}:${{ github.workspace }}/tools" python .github/scripts/gen_report.py -o report.json

      - name: Upload report
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.version }}_report
          path: report.json
